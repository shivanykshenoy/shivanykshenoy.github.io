<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Architect, Manager, Software Engineer">
  <meta name="author" content="Shivany Shenoy">
  <meta property="og:image" content="https://shivanykshenoy.github.io/home-page.png?v=1">
  <meta property="og:title" content="Shivany Shenoy">
  <meta property="og:description" content="Architect, Manager, Software Engineer">
  <meta property="og:url" content="https://shivanykshenoy.github.io/">
  <title>Shivany Shenoy</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <style>
    .hero-section {
      background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 50%, #4ca1af 100%);
    }
    .card-img-uniform {
      height: 210px;
      object-fit: cover;
      width: 100%;
    }
    .placeholder-card-img {
      height: 210px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 .5rem 1.5rem rgba(0,0,0,.15) !important; }
  </style>
</head>
<body class="bg-light">

<div id="app">
  <div class="d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="spinner-border text-secondary" role="status">
      <span class="visually-hidden">Loading&hellip;</span>
    </div>
  </div>
</div>

<script id="main-template" type="text/x-mustache">
<header>
  <div class="collapse bg-dark" id="navbarHeader">
    <div class="container">
      <div class="row py-4">
        <div class="col-sm-8 col-md-7">
          <h5 class="text-white mb-2">About</h5>
          <p class="text-white-50">{{about}}</p>
        </div>
        <div class="col-sm-4 offset-md-1">
          <h5 class="text-white mb-2">Contact</h5>
          <ul class="list-unstyled">
            <li><a href="{{resumeUrl}}" class="text-white text-decoration-none">My Resume</a></li>
            <li><a href="{{linkedinUrl}}" target="_blank" rel="noopener noreferrer" class="text-white text-decoration-none">LinkedIn</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
  <nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
      <button class="btn btn-link navbar-brand text-white text-decoration-none d-flex align-items-center gap-2 p-0"
              data-bs-toggle="collapse" data-bs-target="#navbarHeader"
              aria-controls="navbarHeader" aria-expanded="false" aria-label="Toggle about panel">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-award" viewBox="0 0 16 16">
          <path d="M9.669.864 8 0 6.331.864l-1.858.282-.842 1.68-1.337 1.32L2.6 6l-.306 1.854 1.337 1.32.842 1.68 1.858.282L8 12l1.669-.864 1.858-.282.842-1.68 1.337-1.32L13.4 6l.306-1.854-1.337-1.32-.842-1.68L9.669.864zm1.196 1.193-1.51-.229L8 1.126l-1.355.702-1.51.229-.684 1.365-1.086 1.072.248 1.506 1.087 1.072.684 1.365 1.51.229L8 10.874l1.356-.702 1.509-.229.684-1.365 1.086-1.072L12.387 6l.248-1.506-1.086-1.072-.684-1.365z"/>
          <path d="M4 11.794V16l4-1 4 1v-4.206l-2.018.306L8 13.126 6.018 12.1 4 11.794z"/>
        </svg>
        <strong>About Me</strong>
      </button>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarHeader"
              aria-controls="navbarHeader" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>
</header>

<main>

  <section class="hero-section py-5 text-center text-white">
    <div class="container py-3">
      <h1 class="display-5 fw-bold mb-3">{{name}}</h1>
      <p class="lead mb-4 text-white-50">{{tagline}}</p>
      <div class="d-flex justify-content-center gap-3 flex-wrap">
        <a href="{{linkedinUrl}}" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-lg px-4">LinkedIn Profile</a>
        <a href="{{resumeUrl}}" class="btn btn-outline-light btn-lg px-4">My Resume</a>
      </div>
    </div>
  </section>

  <section class="py-5">
    <div class="container">
      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {{#cards}}
        <div class="col">
          <a href="{{url}}" target="{{target}}" rel="noopener noreferrer" class="text-decoration-none">
            <div class="card h-100 shadow-sm border-0">
              {{#image}}
              <img src="{{image}}" class="card-img-top card-img-uniform" alt="">
              {{/image}}
              {{^image}}
              <div class="card-img-top placeholder-card-img" style="background-color:{{placeholderBg}};">
                <span class="text-white fw-bold text-center px-3 fs-5">{{placeholderText}}</span>
              </div>
              {{/image}}
              <div class="card-body">
                <p class="card-text text-muted small">{{text}}</p>
              </div>
            </div>
          </a>
        </div>
        {{/cards}}
      </div>
    </div>
  </section>

</main>

<footer class="py-3 bg-dark">
  <div class="container d-flex justify-content-between align-items-center">
    <small class="text-white-50">&copy; {{name}}</small>
    <a href="#" class="text-white-50 text-decoration-none small">Back to top &uarr;</a>
  </div>
</footer>
</script>

<script src="https://cdn.jsdelivr.net/npm/mustache@4.2.0/mustache.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  fetch('main.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var tpl = document.getElementById('main-template').innerHTML;
      document.getElementById('app').innerHTML = Mustache.render(tpl, data);
    });
</script>
</body>
</html>
