<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shivany Shenoy &mdash; Resume</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
      .sidebar {
        background: linear-gradient(180deg, #1a2332 0%, #1e2d3d 100%);
        color: #cbd5e1;
        min-height: 100vh;
      }
      .sidebar h5, .sidebar h6 { color: #7db8f7; letter-spacing: 0.04em; font-size: 0.8rem; }
      .sidebar hr { border-color: #2d4a6b; opacity: 1; }
      .sidebar ul { font-size: 0.85rem; }
      .sidebar ul li { padding: 2px 0; }
      .company-logo { width: 38px; height: 38px; object-fit: contain; }
      .card-body > hr:last-child { display: none; }
      @media print {
        .sidebar {
          background: #f8fafc !important;
          color: #1e293b !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        .sidebar h5, .sidebar h6 { color: #1d4ed8 !important; }
        .sidebar hr { border-color: #cbd5e1 !important; }
      }
    </style>
  </head>
  <body>

    <div id="app">
      <div class="d-flex justify-content-center align-items-center" style="min-height:100vh;">
        <div class="spinner-border text-secondary" role="status">
          <span class="visually-hidden">Loading&hellip;</span>
        </div>
      </div>
    </div>

    <script id="resume-template" type="text/x-mustache">
    <div class="container-fluid g-0">
      <div class="row g-0">

        <!-- Sidebar -->
        <div class="col-md-3 sidebar p-4">
          <div class="text-center mb-3">
            <img src="{{profileImage}}" class="img-fluid rounded-circle border border-secondary" style="max-width:65%;" alt="Profile photo">
          </div>
          <hr>
          <h5 class="text-uppercase mb-2">Skills</h5>
          <ul class="list-unstyled mb-3">
            {{#skills}}<li>&#10003;&nbsp;{{.}}</li>{{/skills}}
          </ul>
          <hr>
          <h6 class="text-uppercase mb-2">Education</h6>
          <ul class="list-unstyled mb-3">
            {{#education}}
            <li class="mb-3">
              <strong class="d-block" style="font-size:0.82rem;">{{institution}}</strong>
              {{#degree}}<span class="d-block">{{degree}}</span>{{/degree}}
              <span class="d-block">{{field}}</span>
              <small class="text-secondary">{{years}}</small>
            </li>
            {{/education}}
          </ul>
          <hr>
          <h6 class="text-uppercase mb-2">Volunteering</h6>
          <ul class="list-unstyled mb-3">
            {{#volunteering}}<li class="mb-1">{{.}}</li>{{/volunteering}}
          </ul>
          <hr>
          <h6 class="text-uppercase mb-2">Awards</h6>
          <ul class="list-unstyled mb-3">
            {{#awards}}<li class="mb-1">{{.}}</li>{{/awards}}
          </ul>
          <hr>
          <h6 class="text-uppercase mb-2">Public Speaking</h6>
          <ul class="list-unstyled mb-0">
            {{#publicSpeaking}}<li class="mb-1">{{.}}</li>{{/publicSpeaking}}
          </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 p-4">
          <div class="d-flex align-items-start justify-content-between mb-3 flex-wrap gap-3">
            <div>
              <h1 class="fw-bold mb-0">{{name}}</h1>
              <h4 class="text-primary mt-1 mb-0">{{title}}</h4>
            </div>
            <a href="{{linkedinUrl}}" target="_blank" rel="noopener noreferrer" title="LinkedIn Profile">
              <img src="{{qrCode}}" class="img-thumbnail" style="width:85px;" alt="LinkedIn QR Code">
            </a>
          </div>

          <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
              <h4 class="fw-semibold mb-1">Summary</h4>
              <hr class="mt-1 mb-3">
              <p class="mb-0">{{summary}}</p>
            </div>
          </div>

          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h4 class="fw-semibold mb-1">Experience</h4>
              <hr class="mt-1 mb-3">
              {{#experience}}
              <div class="mb-3">
                <div class="d-flex align-items-center gap-3 mb-2 flex-wrap">
                  <img src="{{logo}}" class="company-logo flex-shrink-0" alt="{{company}} logo">
                  <div class="flex-grow-1">
                    <h5 class="mb-0">{{title}}</h5>
                    <h6 class="text-success mb-0">{{company}}</h6>
                  </div>
                  <div class="text-end flex-shrink-0">
                    <small class="text-muted d-block">{{location}}</small>
                    <small class="text-muted d-block">{{dates}}</small>
                  </div>
                </div>
                <ul class="mb-0 ps-3">
                  {{#bullets}}<li class="mb-1">{{.}}</li>{{/bullets}}
                </ul>
              </div>
              <hr>
              {{/experience}}
            </div>
          </div>
        </div>

      </div>
    </div>
    </script>

    <script src="https://cdn.jsdelivr.net/npm/mustache@4.2.0/mustache.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      fetch('resume.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var tpl = document.getElementById('resume-template').innerHTML;
          document.getElementById('app').innerHTML = Mustache.render(tpl, data);
        });
    </script>
  </body>
</html>
